name: Deploy Backend to EKS

on:
  push:
    branches:
      - deploy/backend

permissions:
  id-token: write # Required for OIDC authentication
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::763054201983:role/GitHubActionsEKSRole
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push Container Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: backend-api
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Update EKS KubeConfig
        run: |
          aws eks update-kubeconfig --name dev-eks --region us-east-1

      - name: Deploy to EKS
        run: |
          # Apply manifest
          kubectl apply -f k8s/deployment.yaml
          
          # Update the deployment with the new image
          kubectl set image deployment/nodejs-backend backend=${{ steps.login-ecr.outputs.registry }}/backend-api:${{ github.sha }}
          
          # Verify rollout
          kubectl rollout status deployment/nodejs-backend